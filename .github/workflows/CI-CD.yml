name: CI-CD

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

env:
  DOTNET_VERSION: "10.0.x"
  API_IMAGE_NAME: "platform-api"
  WORKER_IMAGE_NAME: "platform-worker"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore FacturacionSaaS.sln

      - name: Build
        run: dotnet build FacturacionSaaS.sln -c Release --no-restore

      - name: Test
        run: dotnet test FacturacionSaaS.sln -c Release --no-build --verbosity normal

  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write   # OIDC
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Login Azure via OIDC (sin secretos)
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

          # ⚠️ Nota: el az acr login --name normalmente espera el nombre del ACR, no el login server.
          # Si te da error, cambia ese paso por:
          # az acr login --name <nombre-del-ACR>
          # guardar también el secret ACR_NAME (ej acrfacturacionsaas)

      - name: Set image tags
        id: meta
        run: |
          echo "SHA_TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "DATE_TAG=$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT

      - name: Build & Push API image
        run: |
          docker build \
            -f src/Platform.Api/Dockerfile \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.API_IMAGE_NAME }}:${{ steps.meta.outputs.SHA_TAG }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.API_IMAGE_NAME }}:latest \
            .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.API_IMAGE_NAME }}:${{ steps.meta.outputs.SHA_TAG }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.API_IMAGE_NAME }}:latest

      - name: Build & Push Worker image
        run: |
          docker build \
            -f src/Platform.Worker/Dockerfile \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.WORKER_IMAGE_NAME }}:${{ steps.meta.outputs.SHA_TAG }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.WORKER_IMAGE_NAME }}:latest \
            .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.WORKER_IMAGE_NAME }}:${{ steps.meta.outputs.SHA_TAG }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.WORKER_IMAGE_NAME }}:latest